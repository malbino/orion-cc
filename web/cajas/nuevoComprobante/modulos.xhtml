<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">

    <body>

        <ui:composition template="./../../WEB-INF/systemTemplate.xhtml">

            <ui:define name="content">
                <div class="row">
                    <div class="col-md-12 col-sm-12 ">
                        <div class="x_panel">
                            <div class="x_title">
                                <h2>Modulos <small>seleccionar modulos</small></h2>

                                <div class="clearfix"></div>
                            </div>

                            <div class="x_content">
                                <h:form id="form">
                                    <p:messages/>

                                    <p:dataTable id="modulos" var="modulo" value="#{NuevoComprobanteController.listaModulos()}" selection="#{NuevoComprobanteController.seleccionModulos}" rowKey="#{modulo.id_modulo}"
                                                 emptyMessage="Ningún registro encontrado." tableStyle="width:auto; min-width:100%">
                                        <p:column selectionMode="multiple" style="text-align:center"/>

                                        <p:column headerText="Nº" >  
                                            <h:outputText value="#{modulo.numero}"/>
                                        </p:column>

                                        <p:column headerText="Codigo" >  
                                            <h:outputText value="#{modulo.codigo}"/>
                                        </p:column>

                                        <p:column headerText="Nombre" >  
                                            <h:outputText value="#{modulo.nombre}"/>
                                        </p:column>

                                        <p:column headerText="Horas" >  
                                            <h:outputText value="#{modulo.horas}"/>
                                        </p:column>

                                        <p:column headerText="Creditaje modulo" >  
                                            <h:outputText value="#{modulo.creditajeModulo}"/> 
                                        </p:column>

                                        <p:column headerText="Prerequisitos" >  
                                            <h:outputText value="#{modulo.prerequisitosToString()}"/> 
                                        </p:column>
                                    </p:dataTable>

                                    <div class="ui-g ui-fluid">
                                        <div class="ui-g-12 ui-md-2">
                                            <p:commandButton value="Añadir" icon="fa fa-plus" actionListener="#{NuevoComprobanteController.añadirDetalleModulo()}" update="form"/>
                                        </div>

                                        <div class="ui-g-12 ui-md-2">
                                            <p:commandButton value="Cancelar" icon="fa fa-remove" process="@this" actionListener="#{NuevoComprobanteController.toNuevoComprobante()}"/>
                                        </div>
                                    </div>
                                </h:form>
                            </div>
                        </div>
                    </div>
                </div>
            </ui:define>

        </ui:composition>
    </body>
</html>
