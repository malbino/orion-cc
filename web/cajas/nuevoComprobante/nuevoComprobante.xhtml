<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>

        <ui:composition template="./../../WEB-INF/systemTemplate.xhtml">

            <ui:define name="content">
                <div class="row">
                    <div class="col-md-12 col-sm-12 ">
                        <div class="x_panel">
                            <div class="x_title">
                                <h2>Nuevo Comprobante <small>registrar nuevo comprobante</small></h2>

                                <div class="clearfix"></div>
                            </div>

                            <div class="x_content">
                                <h:form id="form">
                                    <p:messages/>

                                    <div class="ui-g ui-fluid">
                                        <div class="ui-g-12 ui-md-4">
                                            <p:outputLabel for="estudiante" value="Estudiante:"/>
                                            <p:autoComplete id="estudiante" value="#{NuevoComprobanteController.seleccionEstudiante}" completeMethod="#{NuevoComprobanteController.completarEstudiante}" minQueryLength="3" queryDelay="1000" scrollHeight="300"
                                                            var="estudiante" itemLabel="#{estudiante.toString()}" itemValue="#{estudiante}" converter="#{EstudianteConverter}" forceSelection="true"
                                                            required="true" requiredMessage="* Estudiante requerido.">

                                                <p:ajax event="itemSelect" update="inscrito"/>
                                            </p:autoComplete>
                                        </div>

                                        <div class="ui-g-12 ui-md-4">
                                            <p:outputLabel for="inscrito" value="Carrera:"/>
                                            <p:selectOneMenu id="inscrito" value="#{NuevoComprobanteController.seleccionInscrito}" converter="#{InscritoConverter}" autoWidth="false" required="true" requiredMessage="* Carrera requerida.">
                                                <f:selectItem itemLabel="" itemValue=""/>
                                                <f:selectItems value="#{NuevoComprobanteController.listaInscritos()}" var="inscrito" itemLabel="#{inscrito.toString()}" itemValue="#{inscrito}"/>
                                            </p:selectOneMenu>
                                        </div>

                                        <div class="ui-g-12 ui-md-4">
                                            <p:outputLabel for="descuento" value="Descuento:"/>
                                            <p:selectOneMenu id="descuento" value="#{NuevoComprobanteController.seleccionDescuento}" converter="#{DescuentoConverter}" autoWidth="false">
                                                <f:selectItem itemLabel="" itemValue=""/>
                                                <f:selectItems value="#{NuevoComprobanteController.listaDescuentos()}" var="descuento" itemLabel="#{descuento.toString()}" itemValue="#{descuento}"/>
                                                
                                                <p:ajax listener="#{NuevoComprobanteController.aplicarDescuento()}" update="detalles"/>
                                            </p:selectOneMenu>
                                        </div>
                                    </div>

                                    <p:remoteCommand name="updateDetalle" update="detalles"/>
                                    <p:dataTable id="detalles" var="detalle" value="#{NuevoComprobanteController.detalles}" editable="true" reflow="true" 
                                                 rowKey="#{detalle.codigo}" selection="#{NuevoComprobanteController.seleccionDetalle}" selectionMode="single"
                                                 emptyMessage="Ningún registro encontrado." tableStyle="width:auto; min-width:100%">
                                        <p:ajax event="rowEdit" listener="#{NuevoComprobanteController.onRowEdit}" oncomplete="updateDetalle()"/>

                                        <f:facet name="header">
                                            Detalles
                                        </f:facet>

                                        <p:column headerText="Codigo" > 
                                            <h:outputText value="#{detalle.codigo}"/>
                                        </p:column>

                                        <p:column headerText="Cantidad" >
                                            <p:cellEditor>
                                                <f:facet name="output"><h:outputText value="#{detalle.cantidad}" style="float: right"/></f:facet>
                                                <f:facet name="input"><p:inputText value="#{detalle.cantidad}" style="width:100%"/></f:facet>
                                            </p:cellEditor>
                                        </p:column>

                                        <p:column headerText="Unidad de Medida" >
                                            <h:outputText value="#{detalle.unidadMedida}"/>
                                        </p:column>

                                        <p:column headerText="Descripcion" >
                                            <h:outputText value="#{detalle.descripcion}"/>
                                        </p:column>

                                        <p:column headerText="Precio Unitario (Bs.)" >
                                            <h:outputText value="#{detalle.precioUnitario}" style="float: right"/>
                                        </p:column>

                                        <p:column headerText="Descuento (Bs.)" >
                                            <h:outputText value="#{detalle.descuento}" style="float: right"/>
                                        </p:column>

                                        <p:column headerText="Subtotal (Bs.)" >
                                            <h:outputText value="#{detalle.subtotal}" style="float: right"/>
                                        </p:column>

                                        <p:column style="width:35px">
                                            <p:rowEditor />
                                        </p:column>

                                        <p:columnGroup type="footer">
                                            <p:row>
                                                <p:column footerText="Total (Bs.): " colspan="5" style="font-weight: bold; text-align:right"/>
                                                <p:column footerText="#{NuevoComprobanteController.totalDescuentos()}" style="text-align:right"/>
                                                <p:column footerText="#{NuevoComprobanteController.totalComprobante()}" style="text-align:right"/>
                                                <p:column footerText=""/>
                                            </p:row>
                                        </p:columnGroup>

                                        <f:facet name="footer" >
                                            <p:commandButton value="Añadir Concepto" icon="fa fa-plus"  actionListener="#{NuevoComprobanteController.toConceptosPago()}" update="form" />
                                            <p:commandButton value="Añadir Modulo" icon="fa fa-plus"  actionListener="#{NuevoComprobanteController.toModulos()}" />
                                            <p:spacer width="5"/>
                                            <p:commandButton value="Eliminar" icon="fa fa-close"  actionListener="#{NuevoComprobanteController.eliminarDetalle()}" oncomplete="updateDetalle()"/>  
                                            <p:commandButton value="Limpiar" icon="fa fa-trash"  actionListener="#{NuevoComprobanteController.limpiarDetalle()}" oncomplete="updateDetalle()"/>
                                        </f:facet>
                                    </p:dataTable>

                                    <div class="ui-g ui-fluid">
                                        <div class="ui-g-12 ui-md-2">
                                            <p:commandButton value="Guardar" icon="fa fa-save" actionListener="#{NuevoComprobanteController.nuevoComprobante()}" update="form"/>
                                        </div>

                                        <div class="ui-g-12 ui-md-2">
                                            <p:commandButton value="Cancelar" icon="fa fa-remove" process="@this" actionListener="#{NuevoComprobanteController.reinit()}" update="form"/>
                                        </div>
                                    </div>
                                </h:form>
                            </div>
                        </div>
                    </div>
                </div>
            </ui:define>

        </ui:composition>
    </body>
</html>
