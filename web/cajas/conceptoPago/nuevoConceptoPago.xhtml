<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">

    <body>

        <ui:composition template="./../../WEB-INF/systemTemplate.xhtml">

            <ui:define name="content">
                <div class="row">
                    <div class="col-md-12 col-sm-12 ">
                        <div class="x_panel">
                            <div class="x_title">
                                <h2>Nuevo Concepto de Pago <small>registrar nuevo concepto de pago</small></h2>

                                <div class="clearfix"></div>
                            </div>

                            <div class="x_content">
                                <h:form id="form">
                                    <p:messages/>

                                    <div class="ui-g ui-fluid">
                                        <div class="ui-g-12 ui-md-4">
                                            <p:outputLabel for="codigo" value="Codigo:" style="font-size: small"/>
                                            <p:inputText id="codigo" value="#{ConceptoPagoController.nuevoConceptoPago.codigo}" required="true" requiredMessage="* Codigo requerido." />
                                        </div>

                                        <div class="ui-g-12 ui-md-4">
                                            <p:outputLabel for="unidadMedida" value="Unidad de Medida:" style="font-size: small"/>
                                            <p:inputText id="unidadMedida" value="#{ConceptoPagoController.nuevoConceptoPago.unidadMedida}" required="true" requiredMessage="* Unidad de Medida requerida." />
                                        </div>

                                        <div class="ui-g-12 ui-md-4">
                                            <p:outputLabel for="descripcion" value="Descripcion:" style="font-size: small"/>
                                            <p:inputText id="descripcion" value="#{ConceptoPagoController.nuevoConceptoPago.descripcion}" required="true" requiredMessage="* Descripcion requerida." />
                                        </div>

                                        <div class="ui-g-12 ui-md-4">
                                            <p:outputLabel for="precioUnitario" value="Precio Unitario (Bs.):"/> 
                                            <p:inputMask id="precioUnitario" value="#{ConceptoPagoController.nuevoConceptoPago.precioUnitario}" required="true" requiredMessage="* Precio Unitario requerido."/>
                                        </div>
                                    </div>

                                    <div class="ui-g ui-fluid">
                                        <div class="ui-g-12 ui-md-2">
                                            <p:commandButton value="Guardar" icon="fa fa-save" actionListener="#{ConceptoPagoController.crearConceptoPago()}" update="form"/>
                                        </div>

                                        <div class="ui-g-12 ui-md-2">
                                            <p:commandButton value="Cancelar" icon="fa fa-remove" process="@this" actionListener="#{ConceptoPagoController.toConceptosPago()}"/>
                                        </div>
                                    </div>
                                </h:form>
                            </div>
                        </div>
                    </div>
                </div>
            </ui:define>

        </ui:composition>
    </body>
</html>
